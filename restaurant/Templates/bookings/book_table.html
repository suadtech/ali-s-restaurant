{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Book a Table{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Book a Table</h2>
        <form method="post" id="booking-form">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary">Book Now</button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const dateField = document.getElementById('id_date');
    const timeField = document.getElementById('id_time');
    const guestsField = document.getElementById('id_guests');
    const tableField = document.getElementById('id_table');
    
    // Function to fetch available tables
    function fetchAvailableTables() {
        const date = dateField.value;
        const time = timeField.value;
        const guests = guestsField.value;
        
        if (date && time && guests) {
            fetch(`/bookings/check-availability/?date=${date}&time=${time}&guests=${guests}`, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                // Clear existing options
                tableField.innerHTML = '';
                
                // Add default option
                const defaultOption = document.createElement('option');
                defaultOption.value = '';
                defaultOption.textContent = '---------';
                tableField.appendChild(defaultOption);
                
                // Add available tables
                if (data.tables && data.tables.length > 0) {
                    data.tables.forEach(table => {
                        const option = document.createElement('option');
                        option.value = table.id;
                        option.textContent = `Table ${table.number} (${table.capacity})`;
                        tableField.appendChild(option);
                    });
                } else {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = 'No tables available for selected criteria';
                    tableField.appendChild(option);
                }
            });
        }
    }
    
    // Add event listeners
    dateField.addEventListener('change', fetchAvailableTables);
    timeField.addEventListener('change', fetchAvailableTables);
    guestsField.addEventListener('change', fetchAvailableTables);
    
    // Initial fetch if fields have values
    if (dateField.value && timeField.value && guestsField.value) {
        fetchAvailableTables();
    }
});
</script>
{% endblock %}
